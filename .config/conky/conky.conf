conky.config = {
    -- Wayland & Window Settings (COSMIC Compatibility)
    out_to_x = false,
    out_to_wayland = true,
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 160, -- Semi-transparent dark canvas background
    own_window_colour = '#1a1a24',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- Positioning
    alignment = 'top_right',
    gap_x = 30,
    gap_y = 60,
    minimum_width = 330,
    minimum_height = 0,
    forced_text_width = 310,

    -- Anti-Flicker & Performance Buffering
    double_buffer = true,
    no_buffers = true,
    update_interval = 1.0,
    cpu_avg_samples = 2,
    net_avg_samples = 2,

    -- Font & Text Spacing Layout
    use_xft = true,
    font = 'Monospace:size=10',
    xftalpha = 1,
    override_utf8_locale = true,
    draw_shading = false,
    draw_outline = false,
    draw_borders = false,
    uppercase = false,
    line_spacing = 6,

    -- Theme Color Palette
    default_color = '#FFFFFF',       -- White for standard data values
    color1 = '#3A96DD',              -- openSUSE Blue/Cyan for headers
    color2 = '#888888',              -- Grey for labels
    color3 = '#FF5555',              -- Red for critical alerts / hot temps
};

conky.text = [[
${color1}${font Monospace:bold:size=14}SYSTEM OVERVIEW ${hr 2}${font}
${voffset 5}${color2}OS:$color openSUSE Tumbleweed / Leap
${color2}Kernel:$color $kernel on $machine
${color2}Uptime:$color $uptime
${color2}Host:$color $nodename

${color1}${font Monospace:bold:size=12}PROCESSOR ${hr 1}${font}
${voffset 5}${color2}CPU Frequency:$color $freq_g GHz
${color2}CPU Total Usage:$color $cpu% 
${color1}${cpubar 6,310}
${voffset 3}${color2}CPU Temp:$color ${execi 5 sensors | grep -m 1 'Core 0' | awk '{print $3}'} ${goto 180}${color2}Fan Speed:$color ${execi 5 sensors | grep -m 1 'fan' | awk '{print $2" "$3}'}

${color1}${font Monospace:bold:size=12}MEMORY & STORAGE ${hr 1}${font}
${voffset 5}${color2}RAM Usage:$color $mem / $memmax ${goto 240}${color1}$memperc%
${color1}${membar 6,310}
${voffset 5}${color2}Root FS (/):$color ${fs_used /} / ${fs_size /} ${goto 240}${color1}${fs_used_perc /}%
${color1}${fs_bar 6,310 /}

${color1}${font Monospace:bold:size=12}NETWORK ACTIVITY ${hr 1}${font}
${voffset 5}${color2}Local IP:$color ${addr eth0}${addr wlan0}
${voffset 3}${color2}Signal Strength:$color ${wireless_link_qual_perc wlan0}%
${voffset 3}${color2}Download:$color ${downspeed eth0}${downspeed wlan0}/s ${goto 180}${color2}Upload:$color ${upspeed eth0}${upspeed wlan0}/s

${color1}${font Monospace:bold:size=12}TOP PROCESSES ${hr 1}${font}
${voffset 5}${color3}Name ${goto 160}PID ${goto 220}CPU% ${goto 275}MEM%
${color2}${top name 1} ${goto 150}${top pid 1} ${goto 220}${top cpu 1} ${goto 275}${top mem 1}
${color2}${top name 2} ${goto 150}${top pid 2} ${goto 220}${top cpu 2} ${goto 275}${top mem 2}
${color2}${top name 3} ${goto 150}${top pid 3} ${goto 220}${top cpu 3} ${goto 275}${top mem 3}
]];
